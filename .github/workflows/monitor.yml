name: Monitor Ticketmaster

on:
  schedule:
    # Tenta rodar a cada 5 minutos (limite estável do GitHub)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permite que você rode manualmente pelo botão

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Permissão necessária para o robô salvar o index.html no seu projeto
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 cloudscraper

      - name: Executar Script Python
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Atualizar Site (GitHub Pages)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          # Só faz o commit se o arquivo realmente mudar
          git diff --quiet && git diff --staged --quiet || git commit -m "Update status [skip ci]"
          git push
